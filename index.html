<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Game </title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <h1>Simon Game</h1>
    <h2>Press any Key to Start the Game</h2>
    <h3></h3>
    <div class="main">
        <div class="line1">
            <div class="color red" type="button" id="red">1</div>
        <div class="color yellow" type="button" id="yellow">2</div>
        </div> 
       <div class="line2">
        <div class="color green" type="button" id="green">3</div>
        <div class="color blue" type="button" id="blue">4</div>
       </div> 
    </div> 
    

    <script src="app.js"></script>
</body>
</html>
